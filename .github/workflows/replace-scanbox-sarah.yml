name: Replace Scan-Box With Sarah Chat

on:
  workflow_dispatch:

jobs:
  replace-scanbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Write Python script
        run: |
          cat > fix.py << 'PYEOF'
          import glob, re

          files = list(set(glob.glob("./**/*.html", recursive=True) + glob.glob("./*.html")))

          SARAH_BLOCK = """<div style="background:var(--cream-dark);padding:0 5%">
  <div style="max-width:540px;margin:0 auto;padding:40px 0">
    <script src="/sarah.js" data-mode="inline"></script>
  </div>
</div>"""

          SARAH_HERO_DIV = """<div class="hero-form-wrap" style="padding:0;overflow:hidden;background:transparent;box-shadow:0 40px 80px rgba(0,0,0,0.35);border-radius:16px;">
  <script src="/sarah.js" data-mode="inline-hero"></script>
</div>"""

          SARAH_HERO_CSS = "  #es-inline-wrap{margin:0!important;height:480px!important;border-radius:16px!important}\n"

          for filepath in sorted(files):
            if '/api/' in filepath or '.github' in filepath:
              continue
            try:
              with open(filepath, 'r', encoding='utf-8') as f:
                content = f.read()
            except:
              continue

            original = content

            content = re.sub(
              r'<div[^>]*cream-dark[^>]*>\s*<div[^>]*>\s*<div class="scan-box">.*?</div>\s*</div>\s*</div>',
              SARAH_BLOCK,
              content,
              flags=re.DOTALL
            )

            if 'hero-form-wrap' in content:
              content = re.sub(
                r'<div class="hero-form-wrap"[^>]*>.*?</div>',
                SARAH_HERO_DIV,
                content,
                flags=re.DOTALL
              )
              if 'es-inline-wrap' not in content:
                content = content.replace('</style>', SARAH_HERO_CSS + '</style>', 1)

            content = re.sub(r'\s*<script src="/sarah\.js"[^>]*></script>', '', content)
            content = content.replace('</body>', '  <script src="/sarah.js" data-mode="inline"></script>\n</body>')

            if content != original:
              with open(filepath, 'w', encoding='utf-8') as f:
                f.write(content)
              print(f"Updated: {filepath}")
            else:
              print(f"No change: {filepath}")

          print("Done.")
          PYEOF

      - name: Run script
        run: python3 fix.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat: replace scan-box with Sarah chat on all pages"
          git push
