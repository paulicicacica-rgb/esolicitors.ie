name: Fix Hub Story Links

on:
  workflow_dispatch:

jobs:
  fix-hub-stories:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fix hub story sections
        run: python3 fix_hub_stories.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix: replace fake story links with real ones on all hub pages"
          git push
