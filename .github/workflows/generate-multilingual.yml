name: Generate Multilingual Pages

on:
  workflow_dispatch:
    inputs:
      langs:
        description: 'Languages to generate (comma-separated: ro,pt-br,pl,ar,es,ru)'
        required: true
        default: 'ro,pt-br'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGS: ${{ github.event.inputs.langs }}
        run: python3 generate_multilingual.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat: add multilingual pages (${{ github.event.inputs.langs }})"
          git push
