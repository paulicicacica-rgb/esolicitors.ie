name: Replace Forms With Sarah + Fix Nav Width

on:
  workflow_dispatch:

jobs:
  fix-and-inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Run fixes across all HTML files
        run: |
          python3 << 'EOF'
          import os
          import glob
          import re

          files = glob.glob("./**/*.html", recursive=True) + glob.glob("./*.html")
          files = list(set(files))

          NAV_OLD = "    justify-content: space-between;\n  }"
          NAV_NEW = "    justify-content: space-between;\n    overflow: hidden;\n  }"

          # Match any .hero-form-wrap div and its contents (the lead capture form)
          FORM_PATTERN = re.compile(
              r'<div class="hero-form-wrap">.*?</div>\s*</div>\s*(?=</section>)',
              re.DOTALL
          )

          SARAH_INLINE = '<script src="/sarah.js" data-mode="inline"></script>'
          SARAH_HERO   = '''<div class="hero-form-wrap" style="padding:0;overflow:hidden;background:transparent;box-shadow:0 40px 80px rgba(0,0,0,0.35);">
            <script src="/sarah.js" data-mode="inline-hero"></script>
          </div>'''

          SARAH_HERO_CSS = """
            /* Sarah in hero */
            #es-inline-wrap {
              margin: 0 !important;
              height: 480px !important;
              border-radius: 16px !important;
            }
          """

          for filepath in files:
              if '/api/' in filepath:
                  continue
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
              except:
                  continue

              changed = False

              # Fix 1: nav overflow
              if NAV_OLD in content and NAV_NEW not in content:
                  content = content.replace(NAV_OLD, NAV_NEW)
                  changed = True
                  print(f"  Nav fixed: {filepath}")

              # Fix 2: replace hero form with Sarah (only if form exists)
              if 'hero-form-wrap' in content and 'sarah.js' not in content:
                  # Replace the form wrap
                  content = re.sub(
                      r'<div class="hero-form-wrap">.*?</div>(\s*</div>\s*)(?=</section>)',
                      SARAH_HERO + r'\1',
                      content,
                      flags=re.DOTALL
                  )
                  # Add CSS override before </style>
                  if '</style>' in content and 'es-inline-wrap' not in content:
                      content = content.replace('</style>', SARAH_HERO_CSS + '\n  </style>', 1)
                  changed = True
                  print(f"  Form replaced: {filepath}")

              # Fix 3: inject inline sarah on pages without the hero form
              elif 'sarah.js' not in content and 'hero-form-wrap' not in content:
                  content = content.replace('</body>', f'  {SARAH_INLINE}\n</body>')
                  changed = True
                  print(f"  Sarah injected: {filepath}")

              if changed:
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(content)

          print("\nAll done.")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat: replace lead forms with Sarah chat + fix nav overflow"
          git push
