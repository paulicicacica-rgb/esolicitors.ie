name: Add Mobile Nav

on:
  workflow_dispatch:

jobs:
  mobile-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Add mobile hamburger nav
        run: python3 add_mobile_nav.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat: add mobile hamburger nav to all pages"
          git push
