name: Replace Chat With Sarah

on:
  workflow_dispatch:

jobs:
  replace-chat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Replace old chat with Sarah
        run: python3 replace_chat_with_sarah.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat: replace eSolicitors Assistant with Sarah on all hub pages"
          git push
