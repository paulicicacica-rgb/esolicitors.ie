name: Link Story Cards

on:
  workflow_dispatch:

jobs:
  link-cards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Link story cards
        run: python3 link_story_cards.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "feat: link story cards to full story pages"
          git push
