name: Inject Schema JSON-LD

on:
  workflow_dispatch:  # Run manually from GitHub mobile

jobs:
  inject-schema:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run schema injection
        run: python inject_schema.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: inject JSON-LD schema into all HTML pages"
          git push
