name: Diagnostic - Print Case Card Names

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Print all case card names
        run: python3 print_case_names.py

      - name: Write print script
        run: |
          cat > print_case_names.py << 'PYEOF'
          import glob, re
          files = sorted(glob.glob("./**/*.html", recursive=True) + glob.glob("./*.html"))
          for filepath in files:
              if '.github' in filepath or '/api/' in filepath:
                  continue
              try:
                  with open(filepath, 'r', encoding='utf-8') as f:
                      content = f.read()
              except:
                  continue
              if 'case-card' not in content:
                  continue
              names = re.findall(r'<div class="case-name">([^<]+)</div>', content)
              if names:
                  print(f"\n{filepath}")
                  for n in names:
                      print(f"  - {n}")
          PYEOF
          python3 print_case_names.py
