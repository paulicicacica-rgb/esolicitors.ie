name: Fix Year 2025 to 2026

on:
  workflow_dispatch: # Run manually from GitHub Actions tab

jobs:
  fix-year:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Replace 2025 with 2026 in all HTML files
        run: |
          find . -name "*.html" | while read file; do
            if grep -q "2025" "$file"; then
              sed -i 's/2025/2026/g' "$file"
              echo "Updated: $file"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update year 2025 → 2026 across all HTML files"
          git push
