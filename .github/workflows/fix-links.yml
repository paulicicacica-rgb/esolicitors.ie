name: Fix Story Links

on:
  workflow_dispatch:

jobs:
  fix-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fix links
        run: python3 fix_links.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix: remove orphaned story folders and fix card links"
          git push
