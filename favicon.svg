<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Navy background -->
  <rect width="32" height="32" rx="6" fill="#0c1f3d"/>
  <!-- Gold scales - simplified for small size -->
  <!-- Vertical beam -->
  <rect x="15.3" y="6" width="1.4" height="20" fill="#c8922a" rx="0.7"/>
  <!-- Horizontal beam -->
  <rect x="7" y="8.5" width="18" height="1.4" fill="#c8922a" rx="0.7"/>
  <!-- Left chain -->
  <line x1="8.5" y1="9.9" x2="8.5" y2="16" stroke="#c8922a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="23.5" y1="9.9" x2="23.5" y2="16" stroke="#c8922a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left pan -->
  <path d="M5.5 16 Q8.5 20 11.5 16" stroke="#c8922a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Right pan -->
  <path d="M20.5 16 Q23.5 20 26.5 16" stroke="#c8922a" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="12.5" y="26" width="7" height="1.4" fill="#c8922a" rx="0.7"/>
</svg>
