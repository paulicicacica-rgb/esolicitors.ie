<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eSolicitors Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy: #0f1e35;
    --navy-mid: #1a2f4a;
    --gold: #b8975a;
    --gold-light: #d4b07a;
    --cream: #f7f4ef;
    --text: #1c1c1c;
    --text-soft: #5a5a5a;
    --border: #e2ddd6;
    --white: #ffffff;
    --green: #2e7d5e;
  }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Trust badges */
  .trust-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  .trust-badge {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-soft);
    letter-spacing: 0.02em;
  }

  /* Chat container */
  .chat-wrap {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(15,30,53,0.12);
    display: flex;
    flex-direction: column;
    height: 620px;
  }

  /* Header */
  .chat-header {
    background: var(--navy);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
  }
  .header-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .header-avatar svg {
    width: 22px;
    height: 22px;
    fill: var(--navy);
  }
  .header-text h2 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.01em;
  }
  .header-text p {
    font-size: 11.5px;
    color: rgba(255,255,255,0.55);
    margin-top: 2px;
    font-weight: 300;
  }
  .status-dot {
    width: 9px;
    height: 9px;
    background: #4ade80;
    border-radius: 50%;
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    box-shadow: 0 0 0 2px rgba(74,222,128,0.25);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 2px rgba(74,222,128,0.25); }
    50% { box-shadow: 0 0 0 5px rgba(74,222,128,0.1); }
  }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Bubbles */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .msg-avatar svg { width: 15px; height: 15px; fill: var(--navy); }

  .bubble {
    max-width: 78%;
    padding: 12px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
  }
  .bubble.ai {
    background: #f0ede8;
    border-bottom-left-radius: 4px;
  }
  .bubble.user {
    background: var(--navy);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }

  /* Solicitor cards (blurred) */
  .solicitor-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
    animation: fadeUp 0.4s ease;
  }
  .sol-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    filter: blur(3.5px);
    user-select: none;
    pointer-events: none;
    transition: filter 0.3s;
  }
  .sol-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }
  .sol-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .sol-info { flex: 1; min-width: 0; }
  .sol-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .sol-area { font-size: 11px; color: var(--text-soft); margin-top: 1px; }
  .sol-stars { color: #f5a623; font-size: 11px; margin-top: 3px; letter-spacing: 1px; }
  .sol-badge {
    background: var(--navy);
    color: var(--white);
    font-size: 9px;
    font-weight: 500;
    border-radius: 4px;
    padding: 3px 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .unlock-note {
    font-size: 11px;
    color: var(--text-soft);
    text-align: center;
    margin-top: 2px;
    font-style: italic;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.3s ease;
  }
  .typing-bubble {
    background: #f0ede8;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot {
    width: 6px; height: 6px;
    background: #aaa;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Input area */
  .input-wrap {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    background: var(--white);
  }
  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--gold); }
  .input-row textarea {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 80px;
    overflow-y: auto;
  }
  .input-row textarea::placeholder { color: #aaa; }
  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--navy);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  .send-btn:hover { background: var(--navy-mid); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 2; }
  .privacy-note {
    text-align: center;
    font-size: 11px;
    color: #aaa;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .privacy-note svg { width: 11px; height: 11px; fill: #aaa; }
</style>
</head>
<body>

<div class="trust-row">
  <span class="trust-badge">Confidential</span>
  <span class="trust-badge">Free to use</span>
  <span class="trust-badge">All 26 Counties</span>
</div>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="header-avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/></svg>
    </div>
    <div class="header-text">
      <h2>eSolicitors Assistant</h2>
      <p>AI-powered &middot; Matches verified solicitors</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="messages" id="messages">
    <div class="msg-row">
      <div class="msg-avatar">
        <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/></svg>
      </div>
      <div class="bubble ai">
        Welcome to <strong>eSolicitors.ie</strong><br><br>
        Tell me what happened and I will match you with the right solicitor in your county — completely free.
      </div>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Describe your situation..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="privacy-note">
      <svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/></svg>
      Your story is private and never shared without your consent
    </div>
  </div>
</div>

<script>
const SOLICITOR_PROFILES = [
  { name: "C. O'Brien", area: "Criminal & Road Traffic Law", county: "Dublin", reviews: 47, rating: "5.0" },
  { name: "M. Fitzgerald", area: "Drink Driving Defence", county: "Cork", reviews: 31, rating: "4.9" },
  { name: "S. Gallagher", area: "Road Traffic Offences", county: "Galway", reviews: 28, rating: "5.0" },
];

const AVATARS = [
  "https://i.pravatar.cc/80?img=11",
  "https://i.pravatar.cc/80?img=15",
  "https://i.pravatar.cc/80?img=22",
];

let conversationHistory = [];
let stage = "story"; // story → reassure → city → name → phone → done
let collectedData = {};

const systemPrompt = `You are a warm, professional legal intake assistant for eSolicitors.ie, an Irish solicitor matching service. Your name is not mentioned — you speak on behalf of eSolicitors.

Your job is to guide the visitor through a short conversation to match them with a solicitor. Follow these stages:

STAGE: story
- User has just told their story or situation.
- Respond with genuine empathy and reassurance (2-3 sentences max).
- Acknowledge their situation without giving legal advice.
- End with: "The first step is getting the right solicitor on your side — that is exactly what I am here for."
- Then ask: "Which county are you based in?"
- Set stage to: city

STAGE: city
- User has given their county.
- Confirm it warmly. Say you have solicitors in that area.
- Ask: "Can I take your first name?"
- Set stage to: name

STAGE: name
- User gave their name. Use it.
- Say something brief and warm.
- Ask: "And the best phone number for a solicitor to reach you on?"
- Set stage to: phone

STAGE: phone
- User gave phone number.
- Confirm you have everything needed.
- Say: "A solicitor will be in touch with you shortly — usually within a few hours. You are in good hands."
- Set stage to: done

STAGE: done
- If user says anything, respond warmly but briefly. Lead is already captured.

RULES:
- Never give legal advice.
- Never mention fees.
- Keep responses short — 2 to 4 sentences max.
- Warm but professional. No slang. No emojis.
- Respond ONLY with JSON in this format:
{"message": "your response here", "next_stage": "city|name|phone|done|story", "show_solicitors": true|false}
show_solicitors should be true only when responding to the initial story (first reassurance message).`;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function addMessage(text, isUser) {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row' + (isUser ? ' user' : '');

  if (!isUser) {
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/></svg>`;
    row.appendChild(avatar);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (isUser ? 'user' : 'ai');
  bubble.textContent = text;
  row.appendChild(bubble);

  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
  return row;
}

function showSolicitorCards() {
  const messages = document.getElementById('messages');

  const wrapper = document.createElement('div');
  wrapper.style.paddingLeft = '38px';

  const cards = document.createElement('div');
  cards.className = 'solicitor-cards';

  SOLICITOR_PROFILES.forEach((sol, i) => {
    const card = document.createElement('div');
    card.className = 'sol-card';
    card.innerHTML = `
      <div class="sol-avatar"><img src="${AVATARS[i]}" alt=""/></div>
      <div class="sol-info">
        <div class="sol-name">${sol.name}</div>
        <div class="sol-area">${sol.area}</div>
        <div class="sol-stars">★★★★★ <span style="color:#888;font-size:10px">${sol.rating} (${sol.reviews} reviews)</span></div>
      </div>
      <div class="sol-badge">Verified</div>
    `;
    cards.appendChild(card);
  });

  const note = document.createElement('div');
  note.className = 'unlock-note';
  note.textContent = 'Solicitor details revealed after matching';

  wrapper.appendChild(cards);
  wrapper.appendChild(note);
  messages.appendChild(wrapper);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing';
  row.id = 'typing-indicator';
  row.innerHTML = `
    <div class="msg-avatar"><svg viewBox="0 0 24 24"><path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/></svg></div>
    <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  `;
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage(text, true);

  conversationHistory.push({ role: "user", content: text });

  // Store data based on stage
  if (stage === 'city') collectedData.county = text;
  if (stage === 'name') collectedData.name = text;
  if (stage === 'phone') collectedData.phone = text;

  showTyping();

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt + `\n\nCurrent stage: ${stage}`,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    const raw = data.content?.[0]?.text || '{"message":"I am sorry, something went wrong. Please try again.", "next_stage":"story", "show_solicitors":false}';

    let parsed;
    try {
      parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    } catch {
      parsed = { message: raw, next_stage: stage, show_solicitors: false };
    }

    addMessage(parsed.message, false);
    conversationHistory.push({ role: "assistant", content: parsed.message });

    if (parsed.show_solicitors) {
      setTimeout(showSolicitorCards, 400);
    }

    if (parsed.next_stage) stage = parsed.next_stage;

    // If lead is complete, log it
    if (stage === 'done' && collectedData.phone) {
      console.log('Lead captured:', collectedData);
      // TODO: POST to your Google Sheets webhook
    }

  } catch (err) {
    removeTyping();
    addMessage("Something went wrong. Please try again.", false);
  }
}
</script>
</body>
</html>
