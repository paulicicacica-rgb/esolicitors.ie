<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" width="220" height="44">
  <!-- Scales icon in gold -->
  <g transform="translate(2,2)">
    <!-- Vertical beam -->
    <rect x="18" y="7" width="2" height="26" fill="#c8922a" rx="1"/>
    <!-- Horizontal beam -->
    <rect x="7" y="9" width="24" height="2" fill="#c8922a" rx="1"/>
    <!-- Left chain -->
    <line x1="9" y1="11" x2="9" y2="20" stroke="#c8922a" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Right chain -->
    <line x1="29" y1="11" x2="29" y2="20" stroke="#c8922a" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Left pan -->
    <path d="M5.5 20 Q9 25.5 12.5 20" stroke="#c8922a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Right pan -->
    <path d="M25.5 20 Q29 25.5 32.5 20" stroke="#c8922a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Base -->
    <rect x="13" y="33" width="12" height="1.8" fill="#c8922a" rx="0.9"/>
  </g>
  <!-- Wordmark — white on dark -->
  <text x="44" y="30" font-family="'Playfair Display', Georgia, serif" font-size="24" font-weight="700" letter-spacing="-0.3">
    <tspan fill="#ffffff">e</tspan><tspan fill="#c8922a">Solicitors</tspan><tspan fill="rgba(255,255,255,0.7)" font-size="16">.ie</tspan>
  </text>
</svg>
