<!DOCTYPE html>
<html>
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="alternate icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: #0c1f3d;
  font-family: 'Playfair Display', Georgia, serif;
  overflow: hidden;
  position: relative;
}
/* Subtle radial glow top right */
.glow {
  position: absolute;
  top: -200px;
  right: -200px;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(200,146,42,0.12) 0%, transparent 65%);
}
/* Bottom left accent */
.glow2 {
  position: absolute;
  bottom: -150px;
  left: -150px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(200,146,42,0.06) 0%, transparent 65%);
}
/* Gold top border */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #c8922a, #e8b04a, #c8922a);
}
.content {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 72px 96px;
}
/* Tag */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(200,146,42,0.12);
  border: 1px solid rgba(200,146,42,0.35);
  color: #e8b04a;
  padding: 6px 16px;
  border-radius: 100px;
  font-family: 'DM Sans', Arial, sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 28px;
  width: fit-content;
}
/* Main headline */
h1 {
  font-size: 72px;
  font-weight: 900;
  color: #ffffff;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
}
h1 em {
  font-style: italic;
  color: #c8922a;
}
/* Subline */
.sub {
  font-family: 'DM Sans', Arial, sans-serif;
  font-size: 22px;
  color: rgba(255,255,255,0.5);
  font-weight: 300;
  line-height: 1.6;
  max-width: 700px;
  margin-bottom: 48px;
}
/* Pills row */
.pills {
  display: flex;
  gap: 16px;
}
.pill {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 12px 20px;
  font-family: 'DM Sans', Arial, sans-serif;
}
.pill-val {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: #e8b04a;
}
.pill-label {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
/* Logo bottom right */
.logo-mark {
  position: absolute;
  bottom: 52px;
  right: 96px;
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: rgba(255,255,255,0.7);
}
.logo-mark span { color: #c8922a; }
/* Vertical gold line left accent */
.accent-line {
  position: absolute;
  left: 0;
  top: 140px;
  bottom: 140px;
  width: 3px;
  background: linear-gradient(180deg, transparent, #c8922a 30%, #c8922a 70%, transparent);
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <div class="glow2"></div>

    <div class="tag">⚖ Free Irish Solicitor Matching</div>
    <h1>Ireland's free<br><em>solicitor matching</em><br>service.</h1>
